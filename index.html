<html lang="en">
<head>

<title>US Macro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){
  var cdns=[
    "https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js",
    "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js",
    "https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js"
  ];
  var i=0;
  function tryNext(){
    if(i>=cdns.length){console.error("Chart.js failed");return;}
    var s=document.createElement("script");s.src=cdns[i++];
    s.onload=function(){if(typeof Chart==="undefined")tryNext();};
    s.onerror=tryNext;document.head.appendChild(s);
  }
  tryNext();
})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070C18;--bg2:#0A1020;--card:#0D1526;--cardh:#111C30;
  --surf:#141E33;--elev:#1A2640;
  --b0:rgba(148,163,210,.08);--b1:rgba(148,163,210,.18);
  --t1:#F0F4FF;--t2:#8FA4C8;--t3:#4D6080;
  --ind:#6382FF;--cyn:#22D3EE;--grn:#10E8A0;--red:#FF4D6A;
  --gg:rgba(16,232,160,.1);--gr:rgba(255,77,106,.1);--gi:rgba(99,130,255,.12);
  --hl:linear-gradient(90deg,#6382FF,#22D3EE,#10E8A0);
}
html{background:var(--bg);color:var(--t1);font-family:'Sora',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--elev);border-radius:2px}
button{font-family:inherit;cursor:pointer}

/* HEADER */
.hdr{padding:0 28px;height:58px;border-bottom:1px solid var(--b0);display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:100;background:rgba(7,12,24,.95);backdrop-filter:blur(20px)}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--hl)}
.hl{display:flex;align-items:center;gap:14px}
.hr{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#3B5BFF,#22D3EE);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;box-shadow:0 0 20px rgba(59,91,255,.35);flex-shrink:0}
.brand{display:flex;flex-direction:column;gap:2px}
.bn{font-size:14px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.bs{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t2);letter-spacing:.3px}
.hdiv{width:1px;height:20px;background:var(--b0)}
.stag{font-family:'IBM Plex Mono',monospace;font-size:8.5px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.5px;background:rgba(99,130,255,.1);border:1px solid rgba(99,130,255,.25);color:#809BFF}

.tfbar{display:flex;gap:1px;background:var(--surf);border:1px solid var(--b0);border-radius:7px;padding:3px}
.tfb{padding:4px 11px;border:none;border-radius:5px;font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;background:transparent;color:var(--t3);transition:all .15s;letter-spacing:.3px}
.tfb.act{background:var(--ind);color:#fff;box-shadow:0 0 10px rgba(99,130,255,.4)}
.tfb:hover:not(.act){color:var(--t2);background:var(--elev)}
.rbtn{padding:6px 16px;border:1px solid var(--b0);border-radius:7px;background:transparent;color:var(--t2);font-size:11px;font-weight:600;transition:all .15s}
.rbtn:hover{border-color:var(--ind);color:var(--t1);background:var(--gi)}
.rbtn:disabled{opacity:.4;cursor:default}

/* TABS */
.tabs{padding:0 28px;height:44px;display:flex;align-items:center;gap:2px;overflow-x:auto;border-bottom:1px solid var(--b0);background:var(--bg2);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 13px;border:none;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap;background:transparent;color:var(--t3);transition:all .15s}
.tab.act{background:var(--elev);color:var(--t1);font-weight:600}
.tab:hover:not(.act){color:var(--t2);background:var(--surf)}

/* PROGRESS */
.pw{padding:0 28px;margin-top:6px}
.pt{height:2px;background:var(--surf);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;background:var(--hl);transition:width .3s}

/* STATUS */
.sb{margin:14px 28px;padding:10px 16px;border-radius:8px;font-size:12px;line-height:1.5;font-weight:500;display:none}
.sb.err{display:block;background:rgba(255,77,106,.06);border:1px solid rgba(255,77,106,.2);color:#FF6B84}
.sb.ok{display:block;background:rgba(16,232,160,.06);border:1px solid rgba(16,232,160,.2);color:#10E8A0}
.sb.inf{display:block;background:rgba(99,130,255,.06);border:1px solid rgba(99,130,255,.2);color:#809BFF}

/* GRID */
.grid{padding:20px 28px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
@media(max-width:480px){.grid{grid-template-columns:1fr;padding:14px 14px 60px}}
@media(min-width:1600px){.grid{grid-template-columns:repeat(auto-fill,minmax(370px,1fr))}}

/* CARD */
.card{background:var(--card);border:1px solid var(--b0);border-radius:12px;overflow:hidden;transition:border-color .2s,background .2s,transform .2s,box-shadow .2s;animation:fadeUp .4s ease both}
.card:hover{background:var(--cardh);border-color:var(--b1);transform:translateY(-1px);box-shadow:0 8px 32px rgba(0,0,0,.4)}

.ct{padding:16px 18px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.cm{flex:1;min-width:0}

.cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.cdate{font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--t1);white-space:nowrap}
.csrc{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.5px;white-space:nowrap;background:rgba(99,130,255,.08);border:1px solid rgba(99,130,255,.18);color:#6B80A8}
.cfreq{font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:var(--t2);background:var(--surf);padding:2px 7px;border-radius:3px;border:1px solid var(--b1);white-space:nowrap}

.lr{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lt{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bv{font-size:26px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:-.5px;line-height:1;color:var(--t1)}
.dr{display:flex;align-items:center;gap:7px;margin-top:7px;flex-wrap:wrap}
.db{font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px}
.dp{font-size:10px;color:var(--t2);font-family:'IBM Plex Mono',monospace}

.cdesc{font-size:9.5px;color:var(--t2);padding:10px 18px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cdiv{height:1px;background:var(--b0);margin:12px 18px 0}
.cs{padding:8px 10px 12px}
.cw{position:relative;height:100px;width:100%}
.cw canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important}

.skelv{height:26px;width:80px;border-radius:5px;background:linear-gradient(90deg,var(--surf) 25%,var(--elev) 50%,var(--surf) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite}
.skelc{height:90px;margin:8px 10px 12px;border-radius:8px;background:linear-gradient(90deg,var(--surf) 25%,var(--elev) 50%,var(--surf) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite}

.cstat{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t3);padding:6px 18px 0;letter-spacing:.4px}
.cstat.err{color:#FF6B84}

/* NFP release history table */
.nfp-table{margin:12px 18px 0;border-radius:6px;overflow:hidden;border:1px solid var(--b0)}
.nfp-row{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;font-family:'IBM Plex Mono',monospace}
.nfp-hdr{background:var(--surf);font-size:8px;font-weight:700;color:var(--t3);letter-spacing:.6px;text-transform:uppercase}
.nfp-data{border-top:1px solid var(--b0);font-size:9.5px;font-weight:600;color:var(--t2)}
.nfp-data:first-of-type .nfp-cell{color:var(--t1)}
.nfp-cell{padding:5px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nfp-g{color:#10E8A0!important}
.nfp-r{color:#FF4D6A!important}

/* FOOTER */
.ftr{padding:20px 28px;border-top:1px solid var(--b0);background:var(--bg2);color:var(--t2);font-size:10.5px;line-height:1.8;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ftr b{color:var(--t1);font-weight:600}
.ftr-r{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>

<header class="hdr">
  <div class="hl">
    <div class="logo">M</div>

      <div class="bn">US Macro Dashboard</div>

  <div>All data sourced from <b>Federal Reserve Economic Data (FRED)</b> · Federal Reserve Bank of St. Louis</div>
  <div class="ftr-r">AUTO-REFRESHES ON PAGE LOAD · FRED API</div>
</footer>

<script>
var FRED_KEY = "bc1f32b397114934e95d879ec2646074";

var PROXIES = [
  { name:"corsfix",    build:function(u){ return "https://proxy.corsfix.com/?url="+encodeURIComponent(u); }, unwrap:function(j){ return j; } },
  { name:"corsproxy",  build:function(u){ return "https://corsproxy.io/?url="+encodeURIComponent(u); },     unwrap:function(j){ return j; } },
  { name:"allorigins", build:function(u){ return "https://api.allorigins.win/raw?url="+encodeURIComponent(u); }, unwrap:function(j){ return j; } },
  { name:"codetabs",   build:function(u){ return "https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(u); }, unwrap:function(j){ return j; } }
];

var activeProxyIdx = -1;

function probeAllProxies() {
  var testURL = "https://api.stlouisfed.org/fred/series/observations?series_id=FEDFUNDS&api_key="+FRED_KEY+"&file_type=json&sort_order=desc&limit=1&units=lin";
  var i = 0;
  function tryNext() {
    if (i >= PROXIES.length) return Promise.reject(new Error("All proxies failed probe"));
    var p = PROXIES[i]; var idx = i; i++;
    var ctl = new AbortController();
    var to  = setTimeout(function(){ ctl.abort(); }, 8000);
    return fetch(p.build(testURL), { signal: ctl.signal })
      .then(function(r){ clearTimeout(to); if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(function(raw){
        var j = p.unwrap(raw);
        if (!j || !j.observations) throw new Error("bad response shape");
        console.log("✓ Proxy "+idx+" ("+p.name+") works");
        return idx;
      })
      .catch(function(e){
        clearTimeout(to);
        console.warn("✗ Proxy "+idx+" ("+p.name+") failed:", e.message);
        return tryNext();
      });
  }
  return tryNext();
}

function proxyFetch(url, retriesLeft) {
  if (retriesLeft === undefined) retriesLeft = 3;
  var p = PROXIES[activeProxyIdx];
  var ctl = new AbortController();
  var to  = setTimeout(function(){ ctl.abort(); }, 15000);
  return fetch(p.build(url), { signal: ctl.signal })
    .then(function(r){ clearTimeout(to); if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(raw){
      var j = p.unwrap(raw);
      if (!j) throw new Error("empty response");
      return j;
    })
    .catch(function(e){
      clearTimeout(to);
      if (retriesLeft <= 0) throw e;
      console.warn("Proxy "+activeProxyIdx+" ("+p.name+") failed mid-run:", e.message+". Re-probing...");
      activeProxyIdx = -1;
      return probeAllProxies().then(function(idx){
        activeProxyIdx = idx;
        return proxyFetch(url, retriesLeft - 1);
      });
    });
}

// ── FIXED: removed realtime_start parameter ──
function fetchFRED(seriesId, limit, units) {
  var bust = "&_cb="+Math.floor(Date.now()/60000);
  var url = "https://api.stlouisfed.org/fred/series/observations"
    +"?series_id="+seriesId
    +"&api_key="+FRED_KEY
    +"&file_type=json&sort_order=desc&limit="+limit
    +"&units="+(units||"lin")
    +bust;
  return proxyFetch(url).then(function(j){
    if (j.error_code) throw new Error("FRED error: "+j.error_message);
    if (!j.observations) throw new Error("No observations in response");
    return j.observations
      .filter(function(o){ return o.value !== "."; })
      .map(function(o){ return { date: o.date, value: parseFloat(o.value) }; })
      .reverse();
  });
}

function transform(raw, ind) {
  var d = raw.slice();
  if (ind.div) d = d.map(function(v){ return {date:v.date, value:v.value/ind.div}; });
  if (ind.momDiff) {
    var out = [];
    for (var i = 1; i < d.length; i++) {
      out.push({ date: d[i].date, value: Math.round(d[i].value - d[i-1].value) });
    }
    return out;
  }
  return d;
}

function fmtVal(v, ind) {
  if (ind.unit==="$B") return "$"+v.toFixed(1)+"B";
  if (ind.unit==="K")  return (v>=0?"+":"")+Math.round(v)+"K";
  if (ind.unit==="%")  return v.toFixed(2)+"%";
  return v.toFixed(2);
}
function fmtDisp(v, ind) {
  if (ind.unit==="$B") return "$"+v.toFixed(1)+"B";
  if (ind.unit==="K")  return (v<0?"-":"")+Math.abs(Math.round(v))+"K";
  if (ind.unit==="%")  return v.toFixed(2)+"%";
  return v.toFixed(2);
}

var INDS = [
  {id:"cpi",     lbl:"CPI (YoY%)",              s:"CPIAUCSL",        cat:"inflation", desc:"Consumer Price Index, All Urban Consumers SA",    u:"pc1", unit:"%",  type:"area",      col:"#FF4D6A", freq:"Monthly"},
  {id:"coreCpi", lbl:"Core CPI (YoY%)",          s:"CPILFESL",        cat:"inflation", desc:"CPI Excluding Food & Energy SA",                  u:"pc1", unit:"%",  type:"area",      col:"#FF7B8A", freq:"Monthly"},
  {id:"pce",     lbl:"PCE Inflation (YoY%)",     s:"PCEPI",           cat:"inflation", desc:"Personal Consumption Expenditures Price Index",   u:"pc1", unit:"%",  type:"area",      col:"#E11D48", freq:"Monthly"},
  {id:"ppi",     lbl:"PPI (YoY%)",               s:"PPIACO",          cat:"inflation", desc:"Producer Price Index: All Commodities",           u:"pc1", unit:"%",  type:"bar",       col:"#F97316", freq:"Monthly"},
  {id:"fedfunds",lbl:"Fed Funds Rate",           s:"FEDFUNDS",        cat:"rates",     desc:"Effective Federal Funds Rate (monthly avg)",      u:"lin", unit:"%",  type:"step",      col:"#A78BFA", freq:"Monthly"},
  {id:"sofr",    lbl:"SOFR (Daily)",             s:"SOFR",            cat:"rates",     desc:"Secured Overnight Financing Rate",                u:"lin", unit:"%",  type:"line",      col:"#C4B5FD", freq:"Daily"},
  {id:"t10y2y",  lbl:"10Y–2Y Spread",            s:"T10Y2Y",          cat:"rates",     desc:"10-Year minus 2-Year Treasury Spread",            u:"lin", unit:"%",  type:"area_zero", col:"#6382FF", freq:"Daily"},
  {id:"t10y",    lbl:"10Y Treasury Yield",       s:"DGS10",           cat:"rates",     desc:"10-Year Treasury Constant Maturity Rate",         u:"lin", unit:"%",  type:"line",      col:"#818CF8", freq:"Daily"},
  {id:"t2y",     lbl:"2Y Treasury Yield",        s:"DGS2",            cat:"rates",     desc:"2-Year Treasury Constant Maturity Rate",          u:"lin", unit:"%",  type:"line",      col:"#A5B4FC", freq:"Daily"},
  {id:"nfp",     lbl:"Nonfarm Payrolls (MoM)",   s:"PAYEMS",          cat:"labor",     desc:"Total Nonfarm Payrolls, MoM Change (000s)",       u:"lin", unit:"K",  type:"bar_pn",    col:"#38BDF8", freq:"Monthly", momDiff:true},
  {id:"unemp",   lbl:"Unemployment Rate",        s:"UNRATE",          cat:"labor",     desc:"Civilian Unemployment Rate, SA",                  u:"lin", unit:"%",  type:"area",      col:"#22D3EE", freq:"Monthly"},
  {id:"part",    lbl:"Labor Force Participation",s:"CIVPART",         cat:"labor",     desc:"Civilian Labor Force Participation Rate",         u:"lin", unit:"%",  type:"line",      col:"#93C5FD", freq:"Monthly"},
  {id:"claims",  lbl:"Initial Jobless Claims",   s:"ICSA",            cat:"labor",     desc:"Initial Unemployment Insurance Claims",           u:"lin", unit:"K",  type:"line",      col:"#7DD3FC", freq:"Weekly", div:1000},
  {id:"gdp",     lbl:"Real GDP (QoQ ann.%)",     s:"A191RL1Q225SBEA", cat:"growth",    desc:"Real GDP Growth, Quarterly Annualized",           u:"lin", unit:"%",  type:"bar_pn",    col:"#10E8A0", freq:"Quarterly"},
  {id:"retail",  lbl:"Retail Sales (MoM%)",      s:"RSAFS",           cat:"growth",    desc:"Advance Retail Sales: Total, SA",                 u:"pch", unit:"%",  type:"bar_pn",    col:"#34D399", freq:"Monthly"},
  {id:"indprod", lbl:"Industrial Prod. (YoY%)",  s:"INDPRO",          cat:"growth",    desc:"Industrial Production Index",                     u:"pc1", unit:"%",  type:"area",      col:"#6EE7B7", freq:"Monthly"},
  {id:"caputil", lbl:"Capacity Utilization",     s:"TCU",             cat:"growth",    desc:"Total Industry Capacity Utilization",             u:"lin", unit:"%",  type:"line",      col:"#A7F3D0", freq:"Monthly"},
  {id:"umich",   lbl:"Consumer Sentiment",       s:"UMCSENT",         cat:"sentiment", desc:"U. of Michigan Consumer Sentiment Index",         u:"lin", unit:"",   type:"area",      col:"#F59E0B", freq:"Monthly"},
  {id:"conf",    lbl:"Consumer Confidence",      s:"CSCICP03USM665S", cat:"sentiment", desc:"OECD Consumer Confidence Indicator",              u:"lin", unit:"",   type:"line",      col:"#FCD34D", freq:"Monthly"},
  {id:"houst",   lbl:"Housing Starts (K)",       s:"HOUST",           cat:"housing",   desc:"New Residential Housing Units Started, SA",       u:"lin", unit:"K",  type:"bar",       col:"#22D3EE", freq:"Monthly"},
  {id:"permits", lbl:"Building Permits (K)",     s:"PERMIT",          cat:"housing",   desc:"New Private Housing Units Authorized",            u:"lin", unit:"K",  type:"line",      col:"#06B6D4", freq:"Monthly"},
  {id:"cs",      lbl:"Case-Shiller (YoY%)",      s:"CSUSHPINSA",      cat:"housing",   desc:"S&P/Case-Shiller National Home Price Index",      u:"pc1", unit:"%",  type:"area",      col:"#67E8F9", freq:"Monthly"},
  {id:"trade",   lbl:"Trade Balance ($B)",       s:"BOPGSTB",         cat:"trade",     desc:"Trade Balance: Goods and Services",               u:"lin", unit:"$B", type:"area_zero", col:"#EC4899", freq:"Monthly"},
  {id:"m2",      lbl:"M2 Money Supply (YoY%)",   s:"M2SL",            cat:"monetary",  desc:"M2 Money Stock",                                  u:"pc1", unit:"%",  type:"area",      col:"#C084FC", freq:"Monthly"}
];

var CATS = [
  {k:"all",l:"All Indicators",i:"◈"},{k:"inflation",l:"Inflation",i:"▲"},
  {k:"rates",l:"Rates & Yields",i:"◆"},{k:"labor",l:"Labor Market",i:"●"},
  {k:"growth",l:"Growth & Output",i:"■"},{k:"sentiment",l:"Sentiment",i:"◐"},
  {k:"housing",l:"Housing",i:"▣"},{k:"trade",l:"Trade",i:"◇"},{k:"monetary",l:"Monetary",i:"○"}
];

var TFS=["1Y","2Y","5Y","10Y","MAX"], TFM={"1Y":12,"2Y":24,"5Y":60,"10Y":120,"MAX":9999};
var CPTS=18, allData={}, charts={}, curTF="5Y", curCat="all";

function setSB(m,t){var e=document.getElementById("sb");e.className="sb "+t;e.innerHTML=m;e.style.display="block";}
function hideSB(){document.getElementById("sb").style.display="none";}

function buildTFBar(){
  var b=document.getElementById("tfbar"); b.innerHTML="";
  TFS.forEach(function(tf){
    var btn=document.createElement("button");
    btn.className="tfb"+(curTF===tf?" act":"");
    btn.textContent=tf;
    btn.onclick=function(){curTF=tf;buildTFBar();loadAll();};
    b.appendChild(btn);
  });
}

function buildTabs(){
  var nav=document.getElementById("tabs"); nav.innerHTML="";
  CATS.forEach(function(cat){
    var btn=document.createElement("button");
    btn.className="tab"+(curCat===cat.k?" act":"");
    btn.textContent=cat.i+"  "+cat.l;
    btn.onclick=function(){curCat=cat.k;buildTabs();renderGrid();};
    nav.appendChild(btn);
  });
}

function renderGrid(){
  var g=document.getElementById("grid");
  Object.keys(charts).forEach(function(k){if(charts[k]){charts[k].destroy();delete charts[k];}});
  g.innerHTML="";
  var cards=[];
  INDS.filter(function(ind){return curCat==="all"||ind.cat===curCat;})
    .forEach(function(ind,i){
      var c=buildCard(ind,i); g.appendChild(c); cards.push(c);
    });
  setTimeout(function(){
    cards.forEach(function(c){
      if(c._cd&&c._ind){
        var cv=document.getElementById("ch-"+c._ind.id);
        if(cv) renderChart(cv,c._ind,c._cd);
      }
    });
  },50);
}

function buildCard(ind, idx){
  var data = allData[ind.id]||[];
  var card = document.createElement("div");
  card.className="card";
  card.style.animationDelay=(idx*25)+"ms";

  if(!data.length){
    var status = allData[ind.id+":err"] ? '<div class="cstat err">✗ '+allData[ind.id+":err"]+'</div>' : '<div class="cstat">LOADING…</div>';
    card.innerHTML=
      '<div class="ct">'+
        '<div class="cm">'+
          '<div class="lr"><span class="dot" style="background:'+ind.col+';opacity:.3"></span>'+
          '<span class="lt">'+ind.lbl+'</span></div>'+
          '<div class="skelv"></div>'+
        '</div>'+
        '<div class="cmeta"><span class="csrc">FRED</span></div>'+
      '</div>'+
      status+
      '<div class="skelc"></div>';
    return card;
  }

  var tf  = TFM[curTF]||60;
  var sl  = data.slice(-tf);
  var lat = sl[sl.length-1];
  var prv = sl.length>1 ? sl[sl.length-2] : null;
  var chg = prv ? lat.value-prv.value : 0;
  var pct = prv&&prv.value!==0 ? ((lat.value-prv.value)/Math.abs(prv.value))*100 : 0;
  var isMoM = !!ind.momDiff;
  var up  = chg>=0;
  var cd  = sl.slice(-CPTS);
  var dv  = fmtDisp(lat.value, ind);

  var gc  = up?"var(--grn)":"var(--red)";
  var gb  = up?"var(--gg)":"var(--gr)";
  var gbd = up?"rgba(16,232,160,.2)":"rgba(255,77,106,.2)";

  var dstr, cstr;
  if (isMoM) {
    dstr = (chg>=0?"+":"")+Math.round(chg)+"K vs prior";
    cstr = "Prior: "+(prv ? (prv.value>=0?"+":"")+Math.round(prv.value)+"K" : "—");
  } else {
    dstr = Math.abs(chg).toFixed(ind.unit==="K"?0:2)+(ind.unit==="K"?"K":"");
    cstr = (pct>=0?"+":"")+pct.toFixed(2)+"%";
  }

  if (isMoM) {
    var rows = [];
    for (var ri = sl.length-1; ri >= 0 && rows.length < 4; ri--) {
      var cur = sl[ri];
      var prevVal = ri > 0 ? sl[ri-1] : null;
      rows.push({ date: cur.date, actual: cur.value, prev: prevVal ? prevVal.value : null });
    }

    function fmtK(v) {
      if (v === null || v === undefined) return "—";
      return (v>=0?"+":"")+Math.round(v)+"K";
    }
    function colorK(v) {
      if (v === null || v === undefined) return "";
      return v >= 0 ? " nfp-g" : " nfp-r";
    }

    var tableRows = rows.map(function(r) {
      var d = r.date.slice(0,7);
      return '<div class="nfp-row nfp-data">'+
        '<div class="nfp-cell">'+d+'</div>'+
        '<div class="nfp-cell'+colorK(r.actual)+'">'+fmtK(r.actual)+'</div>'+
        '<div class="nfp-cell'+colorK(r.prev)+'">'+fmtK(r.prev)+'</div>'+
        '<div class="nfp-cell" style="color:var(--t3)">N/A</div>'+
      '</div>';
    }).join("");

    card.innerHTML=
      '<div class="ct">'+
        '<div class="cm">'+
          '<div class="lr">'+
            '<span class="dot" style="background:'+ind.col+';box-shadow:0 0 6px '+ind.col+'55"></span>'+
            '<span class="lt">'+ind.lbl+'</span>'+
          '</div>'+
          '<div class="bv">'+dv+'</div>'+
          '<div class="dr">'+
            '<span class="db" style="color:'+gc+';background:'+gb+';border:1px solid '+gbd+'">'+
              (up?'▲':'▼')+' '+dstr+
            '</span>'+
            '<span class="dp">'+cstr+'</span>'+
          '</div>'+
        '</div>'+
        '<div class="cmeta">'+
          '<span class="cdate">'+lat.date+'</span>'+
          '<span class="csrc">FRED</span>'+
          '<span class="cfreq">'+ind.freq.toUpperCase()+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="nfp-table">'+
        '<div class="nfp-row nfp-hdr">'+
          '<div class="nfp-cell">Release</div>'+
          '<div class="nfp-cell">Actual</div>'+
          '<div class="nfp-cell">Previous</div>'+
          '<div class="nfp-cell">Forecast</div>'+
        '</div>'+
        tableRows+
      '</div>'+
      '<div class="cdiv"></div>'+
      '<div class="cs"><div class="cw"><canvas id="ch-'+ind.id+'"></canvas></div></div>';

    card._cd=cd; card._ind=ind;
    return card;
  }

  card.innerHTML=
    '<div class="ct">'+
      '<div class="cm">'+
        '<div class="lr">'+
          '<span class="dot" style="background:'+ind.col+';box-shadow:0 0 6px '+ind.col+'55"></span>'+
          '<span class="lt">'+ind.lbl+'</span>'+
        '</div>'+
        '<div class="bv">'+dv+'</div>'+
        '<div class="dr">'+
          '<span class="db" style="color:'+gc+';background:'+gb+';border:1px solid '+gbd+'">'+
            (up?'▲':'▼')+' '+dstr+
          '</span>'+
          '<span class="dp">'+cstr+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="cmeta">'+
        '<span class="cdate">'+lat.date+'</span>'+
        '<span class="csrc">FRED</span>'+
        '<span class="cfreq">'+ind.freq.toUpperCase()+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="cdesc">'+ind.desc+'</div>'+
    '<div class="cdiv"></div>'+
    '<div class="cs"><div class="cw"><canvas id="ch-'+ind.id+'"></canvas></div></div>';

  card._cd=cd; card._ind=ind;
  return card;
}

function renderChart(canvas, ind, data){
  if(typeof Chart==="undefined") return;
  var labels = data.map(function(d){var p=d.date.split("-");return p[1]+"/"+p[0].slice(2);});
  var values = data.map(function(d){return d.value;});
  var ctx = canvas.getContext("2d");
  if(charts[ind.id]) charts[ind.id].destroy();
  var type, ds;
  var opts = {
    responsive:true, maintainAspectRatio:false,
    animation:{duration:300,easing:'easeOutQuart'},
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:"#0D1526",borderColor:"rgba(99,130,255,.25)",borderWidth:1,
        titleColor:"#8FA4C8",bodyColor:"#F0F4FF",
        titleFont:{family:"'Sora'",size:9.5},
        bodyFont:{family:"'IBM Plex Mono'",size:11,weight:'600'},
        padding:10,cornerRadius:6,displayColors:false,
        callbacks:{label:function(c){return fmtVal(c.parsed.y,ind);}}
      }
    },
    scales:{
      x:{ticks:{font:{family:"'IBM Plex Mono'",size:8.5},color:"#6B80A8",maxTicksLimit:5},grid:{display:false},border:{display:false}},
      y:{ticks:{font:{family:"'IBM Plex Mono'",size:8.5},color:"#6B80A8",maxTicksLimit:4,
          callback:function(v){return Math.abs(v)>=1000?(v/1000).toFixed(0)+"k":Number.isInteger(v)?v:v.toFixed(1);}
        },grid:{color:"rgba(148,163,210,.04)",drawTicks:false},border:{display:false}}
    }
  };

  if(ind.type==="bar"||ind.type==="bar_pn"){
    type="bar";
    var bg=ind.type==="bar_pn"
      ?values.map(function(v){return v>=0?"rgba(16,232,160,.55)":"rgba(255,77,106,.55)";})
      :ind.col+"99";
    var bc=ind.type==="bar_pn"
      ?values.map(function(v){return v>=0?"rgba(16,232,160,.85)":"rgba(255,77,106,.85)";})
      :ind.col;
    ds=[{data:values,backgroundColor:bg,borderColor:bc,borderWidth:1,borderRadius:2,maxBarThickness:14}];
  } else if(ind.type==="area"||ind.type==="area_zero"){
    type="line";
    var g=ctx.createLinearGradient(0,0,0,100);
    g.addColorStop(0,ind.col+"2A"); g.addColorStop(1,ind.col+"03");
    ds=[{data:values,borderColor:ind.col,borderWidth:1.5,backgroundColor:g,fill:true,
         pointRadius:0,pointHoverRadius:3,pointHoverBackgroundColor:ind.col,tension:.35}];
    if(ind.type==="area_zero") opts.scales.y.grid={
      color:function(c){return c.tick.value===0?"rgba(99,130,255,.35)":"rgba(148,163,210,.04)";},drawTicks:false};
  } else if(ind.type==="step"){
    type="line";
    ds=[{data:values,borderColor:ind.col,borderWidth:2,pointRadius:0,
         pointHoverRadius:3,pointHoverBackgroundColor:ind.col,stepped:"after",fill:false}];
  } else {
    type="line";
    ds=[{data:values,borderColor:ind.col,borderWidth:1.5,pointRadius:0,
         pointHoverRadius:3,pointHoverBackgroundColor:ind.col,tension:.35,fill:false}];
  }
  charts[ind.id]=new Chart(ctx,{type:type,data:{labels:labels,datasets:ds},options:opts});
}

function loadAll(){
  hideSB();
  activeProxyIdx = -1;
  Object.keys(allData).forEach(function(k){ if(k.indexOf(":err")>-1) delete allData[k]; });
  document.getElementById("pw").style.display="block";
  document.getElementById("rbtn").disabled=true;
  var done=0, total=INDS.length, ok=0;
  document.getElementById("rbtn").textContent="0/"+total;

  function tick(){
    done++;
    document.getElementById("pf").style.width=(done/total*100)+"%";
    document.getElementById("rbtn").textContent=done+"/"+total;
    if(done>=total) finish();
  }

  function finish(){
    document.getElementById("pw").style.display="none";
    document.getElementById("rbtn").disabled=false;
    document.getElementById("rbtn").textContent="↻ Refresh";
    document.getElementById("sub").textContent=
      "UPDATED "+new Date().toLocaleTimeString().toUpperCase()+" · "+ok+"/"+total+" LOADED";
    renderGrid();
    if(ok===0){
      setSB("❌ All indicators failed. Check browser console (F12). This is almost always a CORS-proxy outage — try refreshing in a minute, or disable ad blockers/VPN.","err");
    } else if(ok<total){
      setSB("⚠️ "+ok+"/"+total+" loaded. Failed indicators show ✗ — click Refresh to retry.","inf");
      setTimeout(hideSB,10000);
    } else {
      setSB("✅ All "+ok+" indicators loaded successfully.","ok");
      setTimeout(hideSB,4000);
    }
  }

  var fredLim = curTF==="MAX"?600:200;

  setSB("🔄 Finding best proxy...","inf");
  probeAllProxies().then(function(idx){
    activeProxyIdx = idx;
    setSB("🔄 Connected via "+PROXIES[idx].name+". Fetching "+total+" indicators...","inf");

    var queue = INDS.slice();
    function worker(){
      if(!queue.length) return;
      var ind = queue.shift();
      fetchFRED(ind.s, fredLim, ind.u)
        .then(function(raw){
          allData[ind.id]=transform(raw, ind);
          delete allData[ind.id+":err"];
          ok++;
          if(ok%4===0) renderGrid();
        })
        .catch(function(e){
          console.error("Failed:", ind.id, e.message);
          allData[ind.id]=[];
          var msg = e.message || "error";
          if(msg.length>40) msg = msg.slice(0,40)+"…";
          allData[ind.id+":err"] = msg;
        })
        .then(function(){
          tick();
          setTimeout(worker, 150);
        });
    }
    worker();
    worker();

  }).catch(function(e){
    console.error("Proxy probe failed:", e.message);
    document.getElementById("pw").style.display="none";
    document.getElementById("rbtn").disabled=false;
    document.getElementById("rbtn").textContent="↻ Refresh";
    setSB("❌ Cannot reach any CORS proxy. All 4 proxies failed to respond. This is usually temporary — wait a minute and retry, or disable ad blockers / VPN. Check F12 console for per-proxy error messages.","err");
  });
}

buildTFBar(); buildTabs(); renderGrid();
var _cjs=setInterval(function(){if(typeof Chart!=="undefined"){clearInterval(_cjs);renderGrid();}},200);
setTimeout(function(){clearInterval(_cjs);},15000);
loadAll();
</script>
