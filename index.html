<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>US Macro Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇺🇸</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#06080C;--bg-card:#0D1017;--bg-card-hover:#111620;
  --bg-surface:#151A24;--bg-elevated:#1C2230;
  --border:#1A2030;--border-active:#2A3550;
  --text-primary:#E2E6EE;--text-secondary:#7A8499;--text-muted:#4A5268;
  --accent-red:#F0475A;--accent-green:#00D68F;--accent-blue:#3B82F6;
  --accent-purple:#8B5CF6;
  --font-display:'DM Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-display)}
body{min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2A3550;border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.card-enter{animation:fadeIn .4s ease both}
.shimmer{background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-surface) 50%,var(--bg-card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>

<script>
// ═══════════════════════════════════════════════
// PASTE YOUR FRED API KEY BELOW
// Free at: https://fred.stlouisfed.org/docs/api/api_key.html
// ═══════════════════════════════════════════════
var FRED_API_KEY = "2447c708f1ac5ca4cbb087ef3e57d8d6";
// ═══════════════════════════════════════════════

var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useCallback = React.useCallback;
var useMemo = React.useMemo;
var RC = Recharts;

var INDICATORS = {
  cpi:           { label:"CPI (YoY%)",               series:"CPIAUCSL",        cat:"inflation", desc:"Consumer Price Index, All Urban Consumers",       tx:"pct_yr", unit:"%",  chart:"area",      color:"#F0475A", freq:"Monthly" },
  coreCpi:       { label:"Core CPI (YoY%)",           series:"CPILFESL",        cat:"inflation", desc:"CPI Less Food & Energy",                          tx:"pct_yr", unit:"%",  chart:"area",      color:"#FB7185", freq:"Monthly" },
  pce:           { label:"PCE Price Index (YoY%)",    series:"PCEPI",           cat:"inflation", desc:"Personal Consumption Expenditures Price Index",    tx:"pct_yr", unit:"%",  chart:"area",      color:"#E11D48", freq:"Monthly" },
  ppi:           { label:"PPI (YoY%)",               series:"PPIACO",          cat:"inflation", desc:"Producer Price Index, All Commodities",            tx:"pct_yr", unit:"%",  chart:"bar",       color:"#F97316", freq:"Monthly" },
  fedFunds:      { label:"Fed Funds Rate",            series:"FEDFUNDS",        cat:"rates",     desc:"Effective Federal Funds Rate",                     tx:"lin",    unit:"%",  chart:"step",      color:"#8B5CF6", freq:"Monthly" },
  treasury10y2y: { label:"10Y-2Y Spread",             series:"T10Y2Y",          cat:"rates",     desc:"10-Year minus 2-Year Treasury Spread",             tx:"lin",    unit:"%",  chart:"area_zero", color:"#6366F1", freq:"Daily" },
  treasury10y:   { label:"10Y Treasury Yield",        series:"DGS10",           cat:"rates",     desc:"10-Year Treasury Constant Maturity Rate",          tx:"lin",    unit:"%",  chart:"line",      color:"#A78BFA", freq:"Daily" },
  unemployment:  { label:"Unemployment Rate",         series:"UNRATE",          cat:"labor",     desc:"Civilian Unemployment Rate",                      tx:"lin",    unit:"%",  chart:"area",      color:"#3B82F6", freq:"Monthly" },
  nfp:           { label:"Nonfarm Payrolls (MoM)",    series:"PAYEMS",          cat:"labor",     desc:"Total Nonfarm Payrolls, Month-over-Month Change", tx:"chg",    unit:"K",  chart:"bar_pn",    color:"#60A5FA", freq:"Monthly" },
  initialClaims: { label:"Initial Jobless Claims",    series:"ICSA",            cat:"labor",     desc:"Initial Claims for Unemployment Insurance",       tx:"lin",    unit:"K",  chart:"line",      color:"#38BDF8", freq:"Weekly", div:1000 },
  participRate:  { label:"Labor Force Participation", series:"CIVPART",         cat:"labor",     desc:"Civilian Labor Force Participation Rate",          tx:"lin",    unit:"%",  chart:"line",      color:"#7DD3FC", freq:"Monthly" },
  gdp:           { label:"Real GDP Growth (QoQ%)",    series:"A191RL1Q225SBEA", cat:"growth",    desc:"Real GDP, Quarterly Annualized",                  tx:"lin",    unit:"%",  chart:"bar_pn",    color:"#00D68F", freq:"Quarterly" },
  retailSales:   { label:"Retail Sales (MoM%)",       series:"RSAFS",           cat:"growth",    desc:"Advance Retail Sales: Total",                     tx:"pct_mo", unit:"%",  chart:"bar_pn",    color:"#34D399", freq:"Monthly" },
  indProd:       { label:"Industrial Prod. (YoY%)",   series:"INDPRO",          cat:"growth",    desc:"Industrial Production: Total Index",               tx:"pct_yr", unit:"%",  chart:"area",      color:"#6EE7B7", freq:"Monthly" },
  capUtil:       { label:"Capacity Utilization",      series:"TCU",             cat:"growth",    desc:"Total Industry Capacity Utilization",              tx:"lin",    unit:"%",  chart:"line",      color:"#A7F3D0", freq:"Monthly" },
  umich:         { label:"Consumer Sentiment",        series:"UMCSENT",         cat:"sentiment", desc:"University of Michigan Consumer Sentiment",        tx:"lin",    unit:"",   chart:"area",      color:"#FBBF24", freq:"Monthly" },
  confBoard:     { label:"Consumer Confidence",       series:"CSCICP03USM665S", cat:"sentiment", desc:"OECD Consumer Confidence Indicator",              tx:"lin",    unit:"",   chart:"line",      color:"#FCD34D", freq:"Monthly" },
  housingStarts: { label:"Housing Starts",            series:"HOUST",           cat:"housing",   desc:"New Privately-Owned Housing Units Started (K)",    tx:"lin",    unit:"K",  chart:"bar",       color:"#06B6D4", freq:"Monthly" },
  buildPermits:  { label:"Building Permits",          series:"PERMIT",          cat:"housing",   desc:"New Private Housing Units Authorized (K)",         tx:"lin",    unit:"K",  chart:"line",      color:"#22D3EE", freq:"Monthly" },
  caseShiller:   { label:"Case-Shiller Home (YoY%)",  series:"CSUSHPINSA",      cat:"housing",   desc:"S&P/Case-Shiller National Home Price Index",      tx:"pct_yr", unit:"%",  chart:"area",      color:"#67E8F9", freq:"Monthly" },
  tradeBal:      { label:"Trade Balance",             series:"BOPGSTB",         cat:"trade",     desc:"Trade Balance: Goods and Services (Billions $)",   tx:"lin",    unit:"$B", chart:"area_zero", color:"#EC4899", freq:"Monthly" },
  m2:            { label:"M2 Money Supply (YoY%)",    series:"M2SL",            cat:"monetary",  desc:"M2 Money Stock",                                  tx:"pct_yr", unit:"%",  chart:"area",      color:"#C084FC", freq:"Monthly" },
};

var CATEGORIES = {
  all:       { label:"All Indicators",  icon:"\u25C9" },
  inflation: { label:"Inflation",       icon:"\uD83D\uDD25" },
  rates:     { label:"Rates & Yields",  icon:"\uD83D\uDCD0" },
  labor:     { label:"Labor Market",    icon:"\uD83D\uDC77" },
  growth:    { label:"Growth & Output", icon:"\uD83C\uDFED" },
  sentiment: { label:"Sentiment",       icon:"\uD83D\uDCCA" },
  housing:   { label:"Housing",         icon:"\uD83C\uDFE0" },
  trade:     { label:"Trade",           icon:"\uD83D\uDEA2" },
  monetary:  { label:"Monetary",        icon:"\uD83D\uDCB0" },
};

var TIMEFRAMES = { "1Y":12, "2Y":24, "5Y":60, "10Y":120, "MAX":9999 };

function fetchFRED(seriesId, limit) {
  var url = "https://api.stlouisfed.org/fred/series/observations?series_id=" + seriesId +
    "&api_key=" + FRED_API_KEY + "&file_type=json&sort_order=desc&limit=" + limit;
  return fetch(url).then(function(r) {
    if (!r.ok) throw new Error("FRED " + r.status);
    return r.json();
  }).then(function(j) {
    return j.observations
      .filter(function(o) { return o.value !== "."; })
      .map(function(o) { return { date: o.date, value: parseFloat(o.value) }; })
      .reverse();
  });
}

function transformData(raw, cfg) {
  var d = raw.slice();
  if (cfg.tx === "pct_yr" && d.length > 12)
    d = d.slice(12).map(function(v, i) { return { date: v.date, value: ((v.value - raw[i].value) / raw[i].value) * 100 }; });
  else if (cfg.tx === "pct_mo" && d.length > 1)
    d = d.slice(1).map(function(v, i) { return { date: v.date, value: ((v.value - raw[i].value) / raw[i].value) * 100 }; });
  else if (cfg.tx === "chg" && d.length > 1)
    d = d.slice(1).map(function(v, i) { return { date: v.date, value: v.value - raw[i].value }; });
  if (cfg.div) d = d.map(function(v) { return { date: v.date, value: v.value / cfg.div }; });
  return d;
}

function fmtVal(v, cfg) {
  if (cfg.unit === "$B") return "$" + v.toFixed(1) + "B";
  if (cfg.unit === "K") return v.toFixed(0) + "K";
  if (cfg.unit === "%") return v.toFixed(2) + "%";
  return v.toFixed(2);
}

function getDelta(data) {
  if (data.length < 2) return { change: 0, pct: 0 };
  var l = data[data.length - 1].value, p = data[data.length - 2].value;
  return { change: l - p, pct: p !== 0 ? ((l - p) / Math.abs(p)) * 100 : 0 };
}

function ChartBlock(props) {
  var data = props.data, cfg = props.cfg, timeframe = props.timeframe;
  var tf = TIMEFRAMES[timeframe] || 60;
  var sliced = data.slice(-tf);
  var fmt = function(v) { return fmtVal(v, cfg); };
  var tickFmt = function(d) { var p = d.split("-"); return p[1] + "/" + p[0].slice(2); };
  var interval = Math.max(0, Math.floor(sliced.length / 5));

  var xProps = { dataKey:"date", tick:{fontSize:10,fill:"#4A5268",fontFamily:"var(--font-mono)"}, tickFormatter:tickFmt, interval:interval, axisLine:{stroke:"#1A2030"}, tickLine:false };
  var yProps = { tick:{fontSize:10,fill:"#4A5268",fontFamily:"var(--font-mono)"}, tickFormatter:function(v){return Math.abs(v)>=1000?(v/1000).toFixed(0)+"k":Number.isInteger(v)?String(v):v.toFixed(1)}, axisLine:false, tickLine:false, width:48 };
  var tipProps = { contentStyle:{background:"#151A24",border:"1px solid #2A3550",borderRadius:8,fontSize:12,color:"#E2E6EE",fontFamily:"var(--font-mono)"}, labelStyle:{color:"#7A8499",fontFamily:"var(--font-display)",marginBottom:4}, formatter:function(v){return[fmt(v),""]}, cursor:{stroke:"#2A3550"} };
  var margin = {top:10,right:8,left:0,bottom:0};
  var grid = h(RC.CartesianGrid, {strokeDasharray:"3 3",stroke:"#141925"});

  if (cfg.chart === "bar" || cfg.chart === "bar_pn") {
    var cells = sliced.map(function(e,i){ return h(RC.Cell, {key:i, fill: cfg.chart==="bar_pn" ? (e.value>=0?"#00D68F":"#F0475A") : cfg.color, fillOpacity:0.8}); });
    return h(RC.ResponsiveContainer, {width:"100%",height:210},
      h(RC.BarChart, {data:sliced,margin:margin}, grid, h(RC.XAxis,xProps), h(RC.YAxis,yProps), h(RC.Tooltip,tipProps),
        cfg.chart==="bar_pn" ? h(RC.ReferenceLine,{y:0,stroke:"#3A4560"}) : null,
        h(RC.Bar, {dataKey:"value",radius:[3,3,0,0],maxBarSize:14}, cells)));
  }
  if (cfg.chart === "area" || cfg.chart === "area_zero") {
    var gid = "g_" + cfg.series;
    return h(RC.ResponsiveContainer, {width:"100%",height:210},
      h(RC.AreaChart, {data:sliced,margin:margin},
        h("defs",null, h("linearGradient",{id:gid,x1:"0",y1:"0",x2:"0",y2:"1"}, h("stop",{offset:"0%",stopColor:cfg.color,stopOpacity:0.25}), h("stop",{offset:"100%",stopColor:cfg.color,stopOpacity:0.01}))),
        grid, h(RC.XAxis,xProps), h(RC.YAxis,yProps), h(RC.Tooltip,tipProps),
        cfg.chart==="area_zero" ? h(RC.ReferenceLine,{y:0,stroke:"#4A5268",strokeDasharray:"6 4"}) : null,
        h(RC.Area, {type:"monotone",dataKey:"value",stroke:cfg.color,strokeWidth:2,fill:"url(#"+gid+")",dot:false})));
  }
  if (cfg.chart === "step") {
    return h(RC.ResponsiveContainer, {width:"100%",height:210},
      h(RC.LineChart, {data:sliced,margin:margin}, grid, h(RC.XAxis,xProps), h(RC.YAxis,yProps), h(RC.Tooltip,tipProps),
        h(RC.Line, {type:"stepAfter",dataKey:"value",stroke:cfg.color,strokeWidth:2.5,dot:false})));
  }
  return h(RC.ResponsiveContainer, {width:"100%",height:210},
    h(RC.LineChart, {data:sliced,margin:margin}, grid, h(RC.XAxis,xProps), h(RC.YAxis,yProps), h(RC.Tooltip,tipProps),
      h(RC.Line, {type:"monotone",dataKey:"value",stroke:cfg.color,strokeWidth:2,dot:false})));
}

function Card(props) {
  var cfg=props.cfg, data=props.data, timeframe=props.timeframe, isOpen=props.isOpen, toggle=props.toggle, delay=props.delay;
  if (!data || !data.length) {
    return h("div",{className:"card-enter",style:{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:14,padding:24,animationDelay:delay+"ms",minHeight:100}},
      h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},
        h("div",{style:{width:8,height:8,borderRadius:"50%",background:cfg.color,opacity:.4}}),
        h("span",{style:{fontSize:11,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"1px",fontWeight:500}},cfg.label)),
      h("div",{className:"shimmer",style:{height:28,borderRadius:6,width:"60%"}}));
  }
  var latest = data[data.length-1];
  var d = getDelta(data);
  var up = d.change >= 0;

  return h("div",{className:"card-enter",onClick:toggle,style:{
    background:isOpen?"var(--bg-card-hover)":"var(--bg-card)",
    border:"1px solid "+(isOpen?cfg.color+"30":"var(--border)"),
    borderRadius:14,cursor:"pointer",transition:"all .25s ease",
    animationDelay:delay+"ms",overflow:"hidden",
    boxShadow:isOpen?"0 0 30px "+cfg.color+"08":"none"}},
    h("div",{style:{padding:"18px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
          h("div",{style:{width:7,height:7,borderRadius:"50%",background:cfg.color,boxShadow:"0 0 8px "+cfg.color+"60"}}),
          h("span",{style:{fontSize:11,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.8px",fontWeight:600}},cfg.label)),
        h("div",{style:{fontSize:26,fontWeight:700,color:"var(--text-primary)",fontFamily:"var(--font-mono)",letterSpacing:"-0.5px"}},fmtVal(latest.value,cfg)),
        h("div",{style:{display:"flex",alignItems:"center",gap:8,marginTop:8}},
          h("span",{style:{fontSize:12,fontWeight:600,fontFamily:"var(--font-mono)",color:up?"var(--accent-green)":"var(--accent-red)",display:"inline-flex",alignItems:"center",gap:3,background:up?"#00D68F12":"#F0475A12",padding:"2px 8px",borderRadius:4}},
            h("span",{style:{fontSize:9}},up?"\u25B2":"\u25BC")," "+Math.abs(d.change).toFixed(2)),
          h("span",{style:{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}},(d.pct>=0?"+":"")+d.pct.toFixed(2)+"%"))),
      h("div",{style:{textAlign:"right",flexShrink:0}},
        h("div",{style:{fontSize:10,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}},latest.date),
        h("div",{style:{fontSize:10,color:"var(--text-muted)",marginTop:2,opacity:.6}},cfg.freq),
        h("div",{style:{fontSize:14,color:"var(--text-muted)",marginTop:10,transform:isOpen?"rotate(180deg)":"rotate(0)",transition:"transform .25s ease"}},"\u25BE"))),
    isOpen ? h("div",{style:{padding:"0 12px 16px",borderTop:"1px solid var(--border)"}},
      h("p",{style:{fontSize:11,color:"var(--text-muted)",margin:"10px 8px 6px",fontStyle:"italic",opacity:.7}},cfg.desc),
      h(ChartBlock,{data:data,cfg:cfg,timeframe:timeframe})) : null);
}

function App() {
  var s1=useState({}),allData=s1[0],setAllData=s1[1];
  var s2=useState(true),loading=s2[0],setLoading=s2[1];
  var s3=useState({done:0,total:0}),progress=s3[0],setProgress=s3[1];
  var s4=useState(null),lastRefresh=s4[0],setLastRefresh=s4[1];
  var s5=useState({}),expanded=s5[0],setExpanded=s5[1];
  var s6=useState("5Y"),timeframe=s6[0],setTimeframe=s6[1];
  var s7=useState("all"),activeCat=s7[0],setActiveCat=s7[1];
  var s8=useState(""),error=s8[0],setError=s8[1];

  var fetchAll = useCallback(function(tf) {
    if (FRED_API_KEY === "YOUR_FRED_API_KEY_HERE") {
      setError("Replace YOUR_FRED_API_KEY_HERE in the HTML file with your FRED API key. Get one free at fred.stlouisfed.org/docs/api/api_key.html");
      setLoading(false); return;
    }
    setLoading(true); setError("");
    var entries = Object.entries(INDICATORS);
    setProgress({done:0,total:entries.length});
    var results = {}; var done = 0;
    function batch(i) {
      if (i >= entries.length) { setAllData(results); setLastRefresh(new Date()); setLoading(false); return; }
      var b = entries.slice(i, i+4);
      Promise.all(b.map(function(e) {
        var id=e[0], cfg=e[1];
        var lim = tf==="MAX" ? 600 : (TIMEFRAMES[tf]||60)+30;
        return fetchFRED(cfg.series, Math.max(lim,160))
          .then(function(raw){results[id]=transformData(raw,cfg);})
          .catch(function(err){console.warn("Fail "+id+":",err);results[id]=[];})
          .then(function(){done++;setProgress({done:done,total:entries.length});});
      })).then(function(){setTimeout(function(){batch(i+4);},250);});
    }
    batch(0);
  },[]);

  useEffect(function(){fetchAll("5Y");},[]);

  var entries = Object.entries(INDICATORS);
  var filtered = entries.filter(function(e){return activeCat==="all"||e[1].cat===activeCat;});
  var catCounts = {};
  Object.values(INDICATORS).forEach(function(v){catCounts[v.cat]=(catCounts[v.cat]||0)+1;});
  var hasData = Object.keys(allData).length > 0;

  return h("div",{style:{minHeight:"100vh",background:"var(--bg-deep)"}},

    // Header
    h("header",{style:{padding:"16px 28px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,position:"sticky",top:0,zIndex:100,background:"#06080CE8",backdropFilter:"blur(16px) saturate(1.4)"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:14}},
        h("div",{style:{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#3B82F6 0%,#8B5CF6 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:"#fff"}},"M"),
        h("div",null,
          h("h1",{style:{fontSize:17,fontWeight:800,color:"var(--text-primary)",letterSpacing:"-0.3px",lineHeight:1.2}},"US Macro Dashboard"),
          h("div",{style:{fontSize:11,color:"var(--text-muted)",marginTop:1}},
            lastRefresh ? "Updated "+lastRefresh.toLocaleTimeString() : "Loading...",
            hasData ? " \u00B7 "+Object.keys(INDICATORS).length+" indicators" : ""))),
      h("div",{style:{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}},
        h("div",{style:{display:"flex",gap:2,background:"var(--bg-surface)",borderRadius:8,padding:3}},
          Object.keys(TIMEFRAMES).map(function(tf){
            return h("button",{key:tf,onClick:function(){setTimeframe(tf);fetchAll(tf);},style:{
              padding:"5px 12px",border:"none",borderRadius:6,fontSize:11,fontWeight:600,
              cursor:"pointer",fontFamily:"var(--font-mono)",transition:"all .2s",
              background:timeframe===tf?"var(--bg-elevated)":"transparent",
              color:timeframe===tf?"var(--text-primary)":"var(--text-muted)"}},tf);})),
        h("button",{onClick:function(){fetchAll(timeframe);},disabled:loading,style:{
          padding:"7px 16px",border:"1px solid var(--border)",borderRadius:8,
          background:loading?"var(--bg-surface)":"transparent",
          color:"var(--text-secondary)",fontSize:12,fontWeight:600,
          cursor:loading?"default":"pointer",transition:"all .2s"}},
          loading ? progress.done+"/"+progress.total : "\u21BB Refresh"))),

    // Category tabs
    h("nav",{style:{padding:"10px 28px",display:"flex",gap:4,overflowX:"auto",borderBottom:"1px solid #0D1017",background:"var(--bg-deep)"}},
      Object.entries(CATEGORIES).map(function(e){
        var key=e[0],cat=e[1],isActive=activeCat===key;
        return h("button",{key:key,onClick:function(){setActiveCat(key);},style:{
          padding:"6px 14px",border:"none",borderRadius:20,fontSize:12,fontWeight:600,
          cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s",fontFamily:"var(--font-display)",
          background:isActive?"var(--bg-elevated)":"transparent",
          color:isActive?"var(--text-primary)":"var(--text-muted)"}},
          cat.icon+" "+cat.label,
          key!=="all" ? h("span",{style:{marginLeft:5,fontSize:10,opacity:.5}},catCounts[key]||0) : null);})),

    // Loading bar
    loading ? h("div",{style:{padding:"0 28px",marginTop:6}},
      h("div",{style:{height:2,background:"var(--bg-surface)",borderRadius:2,overflow:"hidden"}},
        h("div",{style:{height:"100%",borderRadius:2,width:(progress.done/Math.max(progress.total,1))*100+"%",background:"linear-gradient(90deg,var(--accent-blue),var(--accent-purple))",transition:"width .3s ease"}}))) : null,

    // Error
    error ? h("div",{style:{margin:"24px 28px",padding:"16px 20px",background:"#F0475A12",border:"1px solid #F0475A30",borderRadius:12,color:"var(--accent-red)",fontSize:13}},"\u26A0\uFE0F "+error) : null,

    // Cards grid
    h("main",{style:{padding:"20px 28px 40px",display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(360px, 1fr))",gap:10}},
      filtered.map(function(e,i){
        var id=e[0],cfg=e[1];
        return h(Card,{key:id,cfg:cfg,data:allData[id]||[],timeframe:timeframe,isOpen:!!expanded[id],
          toggle:function(){setExpanded(function(prev){var n=Object.assign({},prev);n[id]=!prev[id];return n;});},
          delay:i*40});})),

    // Footer
    h("footer",{style:{padding:"20px 28px",textAlign:"center",borderTop:"1px solid var(--border)",color:"var(--text-muted)",fontSize:11,lineHeight:1.8}},
      "Data sourced from ",h("span",{style:{color:"var(--text-secondary)"}},"Federal Reserve Economic Data (FRED)")," \u00B7 Federal Reserve Bank of St. Louis",
      h("br"),"Dashboard auto-refreshes on page load"));
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
