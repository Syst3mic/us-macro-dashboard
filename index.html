<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Macro Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇺🇸</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080C;--card:#0D1017;--card-hover:#111620;--surface:#151A24;--elevated:#1C2230;--border:#1A2030;--t1:#E2E6EE;--t2:#7A8499;--t3:#4A5268;--red:#F0475A;--green:#00D68F;--blue:#3B82F6;--purple:#8B5CF6}
html{background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,sans-serif}
body{min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2A3550;border-radius:3px}
button{font-family:inherit;cursor:pointer}
.header{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100;background:rgba(6,8,12,.92);backdrop-filter:blur(16px)}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.header-left{display:flex;align-items:center;gap:14px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.title{font-size:17px;font-weight:800;letter-spacing:-0.3px}
.subtitle{font-size:11px;color:var(--t3);margin-top:1px}
.tf-bar{display:flex;gap:2px;background:var(--surface);border-radius:8px;padding:3px}
.tf-btn{padding:5px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;background:transparent;color:var(--t3);transition:all .2s}
.tf-btn.active{background:var(--elevated);color:var(--t1)}
.refresh-btn{padding:7px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--t2);font-size:12px;font-weight:600;transition:all .2s}
.refresh-btn:disabled{background:var(--surface);cursor:default}
.tabs{padding:10px 28px;display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--card);background:var(--bg)}
.tab{padding:6px 14px;border:none;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;background:transparent;color:var(--t3);transition:all .2s}
.tab.active{background:var(--elevated);color:var(--t1)}
.progress-wrap{padding:0 28px;margin-top:6px}
.progress-track{height:2px;background:var(--surface);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .3s ease}
.status-box{margin:16px 28px;padding:14px 20px;border-radius:12px;font-size:13px;line-height:1.6;display:none}
.status-box.error{display:block;background:rgba(240,71,90,.07);border:1px solid rgba(240,71,90,.2);color:var(--red)}
.status-box.success{display:block;background:rgba(0,214,143,.07);border:1px solid rgba(0,214,143,.2);color:var(--green)}
.status-box.info{display:block;background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);color:var(--blue)}
.grid{padding:20px 28px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:10px}
@media(max-width:440px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all .25s;overflow:hidden;animation:fadeIn .4s ease both}
.card.open{background:var(--card-hover)}
.card-head{padding:18px 20px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.card-left{flex:1;min-width:0}.card-right{text-align:right;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.label-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.label-text{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.big-val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px}
.delta-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.delta-badge{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px}
.delta-pct{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.date-text{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.freq-text{font-size:10px;color:var(--t3);margin-top:2px;opacity:.6}
.chevron{font-size:14px;color:var(--t3);margin-top:10px;transition:transform .25s}
.card.open .chevron{transform:rotate(180deg)}
.chart-area{padding:0 12px 16px;border-top:1px solid var(--border)}
.chart-desc{font-size:11px;color:var(--t3);margin:10px 8px 6px;font-style:italic;opacity:.7}
.chart-wrap{position:relative;height:220px}
.footer{padding:20px 28px;text-align:center;border-top:1px solid var(--border);color:var(--t3);font-size:11px;line-height:1.8}
.footer span{color:var(--t2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <div class="logo">M</div>
    <div><div class="title">US Macro Dashboard</div><div class="subtitle" id="subtitle">Connecting...</div></div>
  </div>
  <div class="header-right">
    <div class="tf-bar" id="tf-bar"></div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</header>
<nav class="tabs" id="tabs"></nav>
<div class="progress-wrap" id="progress-wrap" style="display:none"><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div></div>
<div class="status-box" id="status-box"></div>
<div class="grid" id="grid"></div>
<footer class="footer">Data sourced from <span>Federal Reserve Economic Data (FRED)</span> · Federal Reserve Bank of St. Louis<br>Dashboard auto-refreshes on page load</footer>

<script>
// ═══════════════════════════════════════════════
// PASTE YOUR FRED API KEY BELOW
// Free: https://fred.stlouisfed.org/docs/api/api_key.html
// ═══════════════════════════════════════════════
var FRED_API_KEY = "2447c708f1ac5ca4cbb087ef3e57d8d6";
// ═══════════════════════════════════════════════

// CORS proxy list - tries multiple proxies for reliability
var PROXY_LIST = [
  function(u){ return "https://corsproxy.io/?" + encodeURIComponent(u); },
  function(u){ return "https://api.cors.lol/?url=" + encodeURIComponent(u); },
  function(u){ return "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u); }
];
var workingProxy = null;

var INDICATORS = [
  { id:"cpi",           label:"CPI (YoY%)",               series:"CPIAUCSL",        cat:"inflation", desc:"Consumer Price Index, All Urban Consumers",       tx:"pct_yr", unit:"%",  type:"area",      color:"#F0475A", freq:"Monthly" },
  { id:"coreCpi",       label:"Core CPI (YoY%)",           series:"CPILFESL",        cat:"inflation", desc:"CPI Less Food & Energy",                          tx:"pct_yr", unit:"%",  type:"area",      color:"#FB7185", freq:"Monthly" },
  { id:"pce",           label:"PCE Inflation (YoY%)",      series:"PCEPI",           cat:"inflation", desc:"Personal Consumption Expenditures Price Index",    tx:"pct_yr", unit:"%",  type:"area",      color:"#E11D48", freq:"Monthly" },
  { id:"ppi",           label:"PPI (YoY%)",               series:"PPIACO",          cat:"inflation", desc:"Producer Price Index, All Commodities",            tx:"pct_yr", unit:"%",  type:"bar",       color:"#F97316", freq:"Monthly" },
  { id:"fedFunds",      label:"Fed Funds Rate",            series:"FEDFUNDS",        cat:"rates",     desc:"Effective Federal Funds Rate",                     tx:"lin",    unit:"%",  type:"step",      color:"#8B5CF6", freq:"Monthly" },
  { id:"treasury10y2y", label:"10Y-2Y Spread",             series:"T10Y2Y",          cat:"rates",     desc:"10-Year minus 2-Year Treasury Spread",             tx:"lin",    unit:"%",  type:"area_zero", color:"#6366F1", freq:"Daily" },
  { id:"treasury10y",   label:"10Y Treasury Yield",        series:"DGS10",           cat:"rates",     desc:"10-Year Treasury Constant Maturity Rate",          tx:"lin",    unit:"%",  type:"line",      color:"#A78BFA", freq:"Daily" },
  { id:"unemployment",  label:"Unemployment Rate",         series:"UNRATE",          cat:"labor",     desc:"Civilian Unemployment Rate",                      tx:"lin",    unit:"%",  type:"area",      color:"#3B82F6", freq:"Monthly" },
  { id:"nfp",           label:"Nonfarm Payrolls (MoM)",    series:"PAYEMS",          cat:"labor",     desc:"Total Nonfarm Payrolls, Month-over-Month Change", tx:"chg",    unit:"K",  type:"bar_pn",    color:"#60A5FA", freq:"Monthly" },
  { id:"initialClaims", label:"Initial Jobless Claims",    series:"ICSA",            cat:"labor",     desc:"Initial Claims for Unemployment Insurance",       tx:"lin",    unit:"K",  type:"line",      color:"#38BDF8", freq:"Weekly", div:1000 },
  { id:"participRate",  label:"Labor Force Participation", series:"CIVPART",         cat:"labor",     desc:"Civilian Labor Force Participation Rate",          tx:"lin",    unit:"%",  type:"line",      color:"#7DD3FC", freq:"Monthly" },
  { id:"gdp",           label:"Real GDP Growth (QoQ%)",    series:"A191RL1Q225SBEA", cat:"growth",    desc:"Real GDP, Quarterly Annualized",                  tx:"lin",    unit:"%",  type:"bar_pn",    color:"#00D68F", freq:"Quarterly" },
  { id:"retailSales",   label:"Retail Sales (MoM%)",       series:"RSAFS",           cat:"growth",    desc:"Advance Retail Sales: Total",                     tx:"pct_mo", unit:"%",  type:"bar_pn",    color:"#34D399", freq:"Monthly" },
  { id:"indProd",       label:"Industrial Prod. (YoY%)",   series:"INDPRO",          cat:"growth",    desc:"Industrial Production: Total Index",               tx:"pct_yr", unit:"%",  type:"area",      color:"#6EE7B7", freq:"Monthly" },
  { id:"capUtil",       label:"Capacity Utilization",      series:"TCU",             cat:"growth",    desc:"Total Industry Capacity Utilization",              tx:"lin",    unit:"%",  type:"line",      color:"#A7F3D0", freq:"Monthly" },
  { id:"umich",         label:"Consumer Sentiment",        series:"UMCSENT",         cat:"sentiment", desc:"University of Michigan Consumer Sentiment",        tx:"lin",    unit:"",   type:"area",      color:"#FBBF24", freq:"Monthly" },
  { id:"confBoard",     label:"Consumer Confidence",       series:"CSCICP03USM665S", cat:"sentiment", desc:"OECD Consumer Confidence Indicator",              tx:"lin",    unit:"",   type:"line",      color:"#FCD34D", freq:"Monthly" },
  { id:"housingStarts", label:"Housing Starts",            series:"HOUST",           cat:"housing",   desc:"New Privately-Owned Housing Units Started (K)",    tx:"lin",    unit:"K",  type:"bar",       color:"#06B6D4", freq:"Monthly" },
  { id:"buildPermits",  label:"Building Permits",          series:"PERMIT",          cat:"housing",   desc:"New Private Housing Units Authorized (K)",         tx:"lin",    unit:"K",  type:"line",      color:"#22D3EE", freq:"Monthly" },
  { id:"caseShiller",   label:"Case-Shiller Home (YoY%)",  series:"CSUSHPINSA",      cat:"housing",   desc:"S&P/Case-Shiller National Home Price Index",      tx:"pct_yr", unit:"%",  type:"area",      color:"#67E8F9", freq:"Monthly" },
  { id:"tradeBal",      label:"Trade Balance",             series:"BOPGSTB",         cat:"trade",     desc:"Trade Balance: Goods & Services ($B)",             tx:"lin",    unit:"$B", type:"area_zero", color:"#EC4899", freq:"Monthly" },
  { id:"m2",            label:"M2 Money Supply (YoY%)",    series:"M2SL",            cat:"monetary",  desc:"M2 Money Stock",                                  tx:"pct_yr", unit:"%",  type:"area",      color:"#C084FC", freq:"Monthly" }
];

var CATEGORIES=[
  {key:"all",label:"All Indicators",icon:"\u25C9"},{key:"inflation",label:"Inflation",icon:"\uD83D\uDD25"},
  {key:"rates",label:"Rates & Yields",icon:"\uD83D\uDCD0"},{key:"labor",label:"Labor Market",icon:"\uD83D\uDC77"},
  {key:"growth",label:"Growth & Output",icon:"\uD83C\uDFED"},{key:"sentiment",label:"Sentiment",icon:"\uD83D\uDCCA"},
  {key:"housing",label:"Housing",icon:"\uD83C\uDFE0"},{key:"trade",label:"Trade",icon:"\uD83D\uDEA2"},
  {key:"monetary",label:"Monetary",icon:"\uD83D\uDCB0"}
];
var TF_OPTIONS=["1Y","2Y","5Y","10Y","MAX"];
var TF_MAP={"1Y":12,"2Y":24,"5Y":60,"10Y":120,"MAX":9999};
var allData={},charts={},currentTF="5Y",currentCat="all",expandedCards={};

function showStatus(m,t){var e=document.getElementById("status-box");e.className="status-box "+t;e.innerHTML=m;e.style.display="block"}
function hideStatus(){document.getElementById("status-box").style.display="none"}

// Try fetching with proxy, with fallback
function fetchWithProxy(url) {
  if (workingProxy !== null) {
    return fetch(workingProxy(url)).then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    });
  }
  // Try each proxy until one works
  var tries = PROXY_LIST.slice();
  function tryNext() {
    if (tries.length === 0) {
      // Last resort: try direct (might work in some browsers)
      return fetch(url).then(function(r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      });
    }
    var proxy = tries.shift();
    return fetch(proxy(url)).then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      workingProxy = proxy;
      console.log("Working proxy found!");
      return r.json();
    }).catch(function() {
      return tryNext();
    });
  }
  return tryNext();
}

function fetchFRED(seriesId, limit) {
  var url = "https://api.stlouisfed.org/fred/series/observations?series_id=" + seriesId
    + "&api_key=" + FRED_API_KEY + "&file_type=json&sort_order=desc&limit=" + limit;
  return fetchWithProxy(url).then(function(j) {
    if (j.error_code) throw new Error(j.error_message || "FRED error");
    return j.observations.filter(function(o){return o.value!=="."}).map(function(o){return{date:o.date,value:parseFloat(o.value)}}).reverse();
  });
}

function transform(raw,cfg){
  var d=raw.slice();
  if(cfg.tx==="pct_yr"&&d.length>12) d=d.slice(12).map(function(v,i){return{date:v.date,value:((v.value-raw[i].value)/raw[i].value)*100}});
  else if(cfg.tx==="pct_mo"&&d.length>1) d=d.slice(1).map(function(v,i){return{date:v.date,value:((v.value-raw[i].value)/raw[i].value)*100}});
  else if(cfg.tx==="chg"&&d.length>1) d=d.slice(1).map(function(v,i){return{date:v.date,value:v.value-raw[i].value}});
  if(cfg.div) d=d.map(function(v){return{date:v.date,value:v.value/cfg.div}});
  return d;
}
function fmtVal(v,cfg){
  if(cfg.unit==="$B") return "$"+v.toFixed(1)+"B";
  if(cfg.unit==="K") return v.toFixed(0)+"K";
  if(cfg.unit==="%") return v.toFixed(2)+"%";
  return v.toFixed(2);
}

function buildTFBar(){var bar=document.getElementById("tf-bar");bar.innerHTML="";TF_OPTIONS.forEach(function(tf){var b=document.createElement("button");b.className="tf-btn"+(currentTF===tf?" active":"");b.textContent=tf;b.onclick=function(){currentTF=tf;buildTFBar();loadAll()};bar.appendChild(b)})}
function buildTabs(){var nav=document.getElementById("tabs");nav.innerHTML="";CATEGORIES.forEach(function(cat){var b=document.createElement("button");b.className="tab"+(currentCat===cat.key?" active":"");b.textContent=cat.icon+" "+cat.label;b.onclick=function(){currentCat=cat.key;buildTabs();renderGrid()};nav.appendChild(b)})}
function renderGrid(){var grid=document.getElementById("grid");Object.keys(charts).forEach(function(k){if(charts[k]){charts[k].destroy();delete charts[k]}});grid.innerHTML="";INDICATORS.filter(function(ind){return currentCat==="all"||ind.cat===currentCat}).forEach(function(ind,i){grid.appendChild(buildCard(ind,i))})}

function buildCard(ind,idx){
  var data=allData[ind.id]||[];var card=document.createElement("div");card.className="card"+(expandedCards[ind.id]?" open":"");card.style.animationDelay=(idx*40)+"ms";
  if(expandedCards[ind.id]) card.style.borderColor=ind.color+"30";
  if(!data.length){card.innerHTML='<div class="card-head"><div class="card-left"><div class="label-row"><span class="dot" style="background:'+ind.color+';opacity:.4"></span><span class="label-text">'+ind.label+'</span></div><div style="height:28px;border-radius:6px;width:60%;background:var(--surface)"></div></div></div>';card.onclick=function(){toggleCard(ind.id)};return card}
  var tf=TF_MAP[currentTF]||60,sliced=data.slice(-tf),latest=sliced[sliced.length-1],prev=sliced.length>1?sliced[sliced.length-2]:null;
  var change=prev?latest.value-prev.value:0,pct=prev&&prev.value!==0?((latest.value-prev.value)/Math.abs(prev.value))*100:0,up=change>=0;
  var html='<div class="card-head"><div class="card-left"><div class="label-row"><span class="dot" style="background:'+ind.color+';box-shadow:0 0 8px '+ind.color+'60"></span><span class="label-text">'+ind.label+'</span></div><div class="big-val">'+fmtVal(latest.value,ind)+'</div><div class="delta-row"><span class="delta-badge" style="color:'+(up?"var(--green)":"var(--red)")+';background:'+(up?"rgba(0,214,143,.07)":"rgba(240,71,90,.07)")+'"><span style="font-size:9px">'+(up?"\u25B2":"\u25BC")+'</span> '+Math.abs(change).toFixed(2)+'</span><span class="delta-pct">'+(pct>=0?"+":"")+pct.toFixed(2)+'%</span></div></div><div class="card-right"><div class="date-text">'+latest.date+'</div><div class="freq-text">'+ind.freq+'</div><div class="chevron">\u25BE</div></div></div>';
  if(expandedCards[ind.id]) html+='<div class="chart-area"><div class="chart-desc">'+ind.desc+'</div><div class="chart-wrap"><canvas id="chart-'+ind.id+'"></canvas></div></div>';
  card.innerHTML=html;card.onclick=function(){toggleCard(ind.id)};
  if(expandedCards[ind.id]) requestAnimationFrame(function(){var canvas=document.getElementById("chart-"+ind.id);if(canvas) renderChart(canvas,ind,sliced)});
  return card;
}
function toggleCard(id){expandedCards[id]=!expandedCards[id];renderGrid()}

function renderChart(canvas,ind,data){
  var labels=data.map(function(d){var p=d.date.split("-");return p[1]+"/"+p[0].slice(2)});
  var values=data.map(function(d){return d.value});var ctx=canvas.getContext("2d");
  if(charts[ind.id]) charts[ind.id].destroy();
  var type,datasets,options;
  var baseOpts={responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false},tooltip:{backgroundColor:"#151A24",borderColor:"#2A3550",borderWidth:1,titleColor:"#7A8499",bodyColor:"#E2E6EE",titleFont:{family:"'DM Sans'",size:11},bodyFont:{family:"'JetBrains Mono'",size:12},padding:10,cornerRadius:8,callbacks:{label:function(c){return fmtVal(c.parsed.y,ind)}}}},scales:{x:{ticks:{font:{family:"'JetBrains Mono'",size:10},color:"#4A5268",maxTicksLimit:6},grid:{color:"#141925",drawTicks:false},border:{color:"#1A2030"}},y:{ticks:{font:{family:"'JetBrains Mono'",size:10},color:"#4A5268",callback:function(v){return Math.abs(v)>=1000?(v/1000).toFixed(0)+"k":Number.isInteger(v)?v:v.toFixed(1)}},grid:{color:"#141925",drawTicks:false},border:{display:false}}}};
  if(ind.type==="bar"||ind.type==="bar_pn"){type="bar";var bg=ind.type==="bar_pn"?values.map(function(v){return v>=0?"rgba(0,214,143,.7)":"rgba(240,71,90,.7)"}):ind.color+"CC";datasets=[{data:values,backgroundColor:bg,borderRadius:3,maxBarThickness:14}];options=JSON.parse(JSON.stringify(baseOpts))}
  else if(ind.type==="area"||ind.type==="area_zero"){type="line";var gradient=ctx.createLinearGradient(0,0,0,220);gradient.addColorStop(0,ind.color+"40");gradient.addColorStop(1,ind.color+"03");datasets=[{data:values,borderColor:ind.color,borderWidth:2,backgroundColor:gradient,fill:true,pointRadius:0,tension:.3}];options=JSON.parse(JSON.stringify(baseOpts));if(ind.type==="area_zero") options.scales.y.grid={color:function(c){return c.tick.value===0?"#4A5268":"#141925"}}}
  else if(ind.type==="step"){type="line";datasets=[{data:values,borderColor:ind.color,borderWidth:2.5,pointRadius:0,stepped:"after",fill:false}];options=JSON.parse(JSON.stringify(baseOpts))}
  else{type="line";datasets=[{data:values,borderColor:ind.color,borderWidth:2,pointRadius:0,tension:.3,fill:false}];options=JSON.parse(JSON.stringify(baseOpts))}
  charts[ind.id]=new Chart(ctx,{type:type,data:{labels:labels,datasets:datasets},options:options});
}

function loadAll(){
  if(FRED_API_KEY==="YOUR_FRED_API_KEY_HERE"){showStatus("\u26A0\uFE0F Replace YOUR_FRED_API_KEY_HERE with your FRED API key. Get one free at <a href='https://fred.stlouisfed.org/docs/api/api_key.html' style='color:inherit' target='_blank'>fred.stlouisfed.org</a>","error");return}
  hideStatus();
  document.getElementById("progress-wrap").style.display="block";
  document.getElementById("refresh-btn").disabled=true;
  var done=0,total=INDICATORS.length,successCount=0,failedList=[];
  document.getElementById("refresh-btn").textContent="0/"+total;

  function tick(){done++;document.getElementById("progress-fill").style.width=(done/total*100)+"%";document.getElementById("refresh-btn").textContent=done+"/"+total;if(done>=total) finish()}
  function finish(){
    document.getElementById("progress-wrap").style.display="none";
    document.getElementById("refresh-btn").disabled=false;
    document.getElementById("refresh-btn").textContent="\u21BB Refresh";
    document.getElementById("subtitle").textContent="Updated "+new Date().toLocaleTimeString()+" \u00B7 "+successCount+"/"+total+" loaded";
    renderGrid();
    if(successCount===0) showStatus("\u274C All indicators failed. Error: "+failedList[0]+". Try disabling ad blockers or opening in incognito.","error");
    else if(failedList.length>0) showStatus("\u26A0\uFE0F "+failedList.length+" indicator(s) failed to load","info");
    else showStatus("\u2705 All "+successCount+" indicators loaded successfully!","success");
    if(successCount>0) setTimeout(hideStatus, 3000);
  }

  var queue=INDICATORS.slice();
  function next(){
    if(queue.length===0) return;
    var ind=queue.shift();
    var lim=currentTF==="MAX"?600:(TF_MAP[currentTF]||60)+30;
    fetchFRED(ind.series,Math.max(lim,160))
      .then(function(raw){allData[ind.id]=transform(raw,ind);successCount++;if(successCount%4===0)renderGrid()})
      .catch(function(e){console.warn("Failed:",ind.id,e.message);failedList.push(ind.id+": "+e.message);allData[ind.id]=[]})
      .then(function(){tick();if(queue.length>0) setTimeout(next,200)});
  }
  // Start 2 parallel streams
  next();next();
}

// Init
buildTFBar();buildTabs();renderGrid();
if(FRED_API_KEY==="YOUR_FRED_API_KEY_HERE"){
  showStatus("\u26A0\uFE0F Replace YOUR_FRED_API_KEY_HERE with your FRED API key. Get one free at <a href='https://fred.stlouisfed.org/docs/api/api_key.html' style='color:inherit' target='_blank'>fred.stlouisfed.org</a>","error");
}else{
  showStatus("\uD83D\uDD04 Finding best proxy and connecting to FRED API...","info");
  loadAll();
}
</script>
